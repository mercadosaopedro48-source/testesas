<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner IA de Estoque</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --card-bg: #fff;
            --primary: #007bff;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --text-color: #e6e6e6;
            --card-bg: #16213e;
            --primary: #0f3460;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
            margin: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            align-items: center;
        }

        .scanner-container {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            margin-top: 15px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:active {
            opacity: 0.8;
        }

        #theme-toggle {
            width: auto;
            padding: 8px 12px;
            margin: 0;
            font-size: 14px;
        }

        .result-box {
            margin-top: 20px;
            text-align: left;
            background: var(--bg-color);
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Scanner IA</h2>
        <button id="theme-toggle" onclick="toggleTheme()">🌙 Escuro</button>
    </div>

    <div class="scanner-container">
        <video id="camera" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <button onclick="capturarEAnalisar()" id="btn-scan">📷 Escanear Etiqueta</button>
        
        <div id="resultado" class="result-box">Aguardando escaneamento...</div>
    </div>

    <script>
        // === COLOQUE SUA CHAVE DA API AQUI ===
        const API_KEY = 'AIzaSyBabfNtjBxp_BIgApFJz2J6W-dKiRMBj0o'; 
        
        const video = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        const resultadoDiv = document.getElementById('resultado');
        const btnScan = document.getElementById('btn-scan');

        // Alternar Tema Claro/Escuro
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerText = "🌙 Escuro";
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = "☀️ Claro";
            }
        }

        // Ligar a câmera traseira do celular
        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } // Força a câmera traseira
                });
                video.srcObject = stream;
            } catch (err) {
                resultadoDiv.innerText = "Erro ao acessar a câmera. Verifique as permissões.";
                console.error(err);
            }
        }

        // Tirar a foto e mandar para a IA
        async function capturarEAnalisar() {
            if (!API_KEY || API_KEY === 'AIzaSyBabfNtjBxp_BIgApFJz2J6W-dKiRMBj0o') {
                resultadoDiv.innerText = "ERRO: Você precisa colocar sua API Key no código!";
                return;
            }

            btnScan.innerText = "⏳ Analisando...";
            btnScan.disabled = true;
            resultadoDiv.innerText = "Lendo imagem...";

            // Capturar o frame do vídeo
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Converter a imagem para Base64 (sem o cabeçalho "data:image/jpeg;base64,")
            const imagemBase64 = canvas.toDataURL('image/jpeg').split(',')[1];

            // Montar a requisição para o Gemini 1.5 Flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: "Atue como um scanner de inventário profissional. Analise a imagem e extraia os dados no formato JSON: {\"marca\": \"...\", \"produto\": \"...\", \"quantidade\": \"...\", \"preco\": 0.00}. Caso não encontre algo, retorne null. Retorne apenas o JSON limpo." },
                        { inline_data: { mime_type: "image/jpeg", data: imagemBase64 } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                // Extrair o texto da resposta do Gemini
                let textoResposta = data.candidates[0].content.parts[0].text;
                
                // Limpar a formatação markdown (```json ... ```) se a IA retornar com ela
                textoResposta = textoResposta.replace(/```json/g, "").replace(/```/g, "").trim();
                
                // Mostrar o resultado na tela
                resultadoDiv.innerText = JSON.stringify(JSON.parse(textoResposta), null, 2);
                
                // AQUI VOCÊ PODE CHAMAR A FUNÇÃO PARA SALVAR NA PLANILHA
                // salvarNaPlanilha(JSON.parse(textoResposta));

            } catch (error) {
                console.error(error);
                resultadoDiv.innerText = "Erro ao processar a imagem. Tente novamente.";
            } finally {
                btnScan.innerText = "📷 Escanear Etiqueta";
                btnScan.disabled = false;
            }
        }

        // Inicia a câmera quando a página carrega
        window.onload = iniciarCamera;
    </script>
</body>
</html>
